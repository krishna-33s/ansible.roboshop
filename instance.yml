- name: ec2instance and records
  hosts: all
  connection: local
  vars:
    ami: ami-0220d79f3f480ecf5
    sg_id: sg-0d5cb8ef26a360d1a
    env: dev
    instance:
    - mongodb
    - catalogue

  tasks:
  - name: instance creating
    amazon.aws.ec2_instance:
      image_id: "{{ ami }}"
      security_group: "{{ sg_id }}"
      instance_type: "t3.micro"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        component: "{{ item }}"
        env: "{{ item }}"
        name: "{{ item }}-{{ env }}"

    loop: "{{ instance }}"
    register: ec2_output

  - name: print ec2_output
    ansible.builtin.debug:
     msg: "{{ ec2_output }}"
      
