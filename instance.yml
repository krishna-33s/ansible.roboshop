- name: ec2instance and records
  hosts: all
  connection: local
  vars:
    ami: ami-0220d79f3f480ecf5
    sg_id: sg-0d5cb8ef26a360d1a
    domain: krishnadev.space
    actions: create
    env: dev
    instances:
    - mongodb
    - catalogue

  tasks:
  - name: instance creating
    amazon.aws.ec2_instance:
      image_id: "{{ ami }}"
      security_group: "{{ sg_id }}"
      instance_type: "t3.micro"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Env: "{{ item }}"
        Name: "{{ item }}-{{ env }}"

    loop: "{{ instances }}"
    register: ec2_output
    when: actions == "create"

  - name: print ec2_output
    ansible.builtin.debug:
     msg: "{{ ec2_output }}"
    when: actions == "create" 

  - name: creating records
    amazon.aws.route53:
      state: present
      zone: "{{ domain }}"
      record: "{{ item.item }}-{{ env }}.{{ domain }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"  
    when: actions == "create"

  - name: creating records
    amazon.aws.route53:
      state: present
      zone: "{{ domain }}"
      record: "roboshop-{{ env }}.{{ domain }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"    
    when: 
    - item.item == "frontend"
    - actions == "create"

  - name: delete frontend records
    amazon.aws.route53:
      state: absent
      zone: "{{ domain }}"
      record: "roboshop-{{ env }}.{{ domain }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"    
    when: 
    - item == "frontend"
    - actions == "destroy"  

  - name: delete r53 records
    amazon.aws.ec2_instance:
      state: absent
      zone: "{{ domain }}"
      record: "{{ item }}-{{ env }}.{{ domain }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when: actions == "destroy"

  - name : delete ec2_instance
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    when: actions == "destroy"
