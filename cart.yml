- name : creating cart 
  hosts: cart 
  become: yes

  tasks:
  - name: enable nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: adding cart
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system cart"

  - name: delete recent app file
    ansible.builtin.file:
      path: /app
      state: absent    

  - name: creating app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete recent zip file
    ansible.builtin.file:
      path: /tmp/cart.zip
      state: absent

  - name: download url
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
      dest: /tmp/cart.zip                

  - name: unarchieve
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app  
      remote_src: yes  

  - name: installing dependencies
    community.general.npm:
      path: /app

  - name: system services
    ansible.builtin.template:
      src: cart.service
      dest: /etc/systemd/system/cart.service

  - name: daemon reload
    ansible.builtin.systemd_service: 
      daemon_reload: true   

  - name: start cart
    ansible.builtin.service:
      name: cart
      enabled: yes
      state: restarted