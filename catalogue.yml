- name: catalogue installation
  hosts: catalogue
  become: yes

  tasks:
  - name: enable nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: adding user
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: delete recent app file
    ansible.builtin.file:
      path: /app
      state: absent    

  - name: creating app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete recent zip file
    ansible.builtin.file:
      path: /tmp/catalogue.zip
      state: absent

  - name: download url
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
      dest: /tmp/catalogue.zip                

  - name: unarchieve
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app  
      remote_src: yes  

  - name: installing dependencies
    community.general.npm:
      path: /app

  - name: copy catalogue service
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: copy mongo.repo  
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongo client
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present

  - name: products loading
    ansible.builtin.command: mongosh --host "{{ MONGO_IP }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: load the products
    ansible.builtin.shell: mongosh --host "{{ MONGO_IP }}" </app/db/master-data.js          
    when: catalogue_output.stdout | int < 0

  - name: start the service
    ansible.builtin.service:
      name: catalogue
      state : restarted
      enabled: yes       